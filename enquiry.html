<h1>Send us an Enquiry</h1>
<p>Have a special request or a question about our catering? Fill out the form below!</p>

<form>
    <label>Your Name:</label><br>
    <input type="text" name="name" placeholder="Enter your name"><br><br>

    <label>Your Email:</label><br>
    <input type="email" name="email" placeholder="Enter your email"><br><br>

    <label>What are you interested in?</label><br>
    <select name="interest">
        <option value="cakes">Custom Cakes</option>
        <option value="catering">Event Catering</option>
        <option value="feedback">General Feedback</option>
    </select><br><br>

    <label>Your Message:</label><br>
    <textarea name="message" rows="4" cols="30"></textarea><br><br>

    <input type="submit" value="Submit Enquiry">
</form>
